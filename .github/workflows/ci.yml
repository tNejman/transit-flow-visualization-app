name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  build-test-and-containerize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create dummy .env file
        run: printf "DB_ADDRESS=\nDB_PORT=\nDB_NAME=\nDB_USER=\nDB_PASS=\nACTIVE_PROFILE=dev" > .env

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Run Maven Tests
        run: ./mvnw clean test

      - name: Test Docker Image Build
        run: |
          docker compose up --build -d
          sleep 15
          docker compose ps
          docker compose down
